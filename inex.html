<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>স্মার্ট স্ক্যানার | QR ও টেক্সট, ফোন নম্বর কপি/শেয়ার</title>
    <!-- Html5Qrcode Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b0f17, #141a24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(20, 26, 36, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 22px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b3e5fc, #81d4fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #9aa4bf;
            font-size: 0.8rem;
            margin-bottom: 24px;
            border-bottom: 1px dashed #2a3448;
            display: inline-block;
            width: auto;
            padding-bottom: 5px;
        }
        .camera-box {
            background: #00000030;
            border-radius: 32px;
            padding: 8px;
            border: 1px solid #2c7da0;
            margin-bottom: 18px;
        }
        #reader {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
        }
        .cam-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0 8px;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2d3748;
            color: #e2e8f0;
        }
        .btn-primary { background: #0f3b5c; color: white; box-shadow: 0 2px 8px #00a0ff40; }
        .btn-danger { background: #4a2a2f; color: #fbcfe8; }
        .btn-success { background: #1f5a3a; color: white; }
        select {
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-weight: 500;
            outline: none;
        }
        .result-area {
            background: #0f121bd9;
            border-radius: 28px;
            padding: 18px;
            margin: 20px 0;
            border: 1px solid #2a3448;
        }
        .scanned-text {
            background: #05070c;
            padding: 14px;
            border-radius: 20px;
            color: #cbd5e6;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9rem;
            border-left: 5px solid #3b82f6;
            margin: 12px 0;
        }
        .phone-block {
            background: #10131f;
            border-radius: 24px;
            padding: 12px;
            margin-top: 8px;
        }
        .detected-number {
            background: #1a1f2b;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            color: #bbf0ff;
            word-break: break-all;
            margin: 12px 0;
            letter-spacing: 0.5px;
        }
        .copy-big {
            width: 100%;
            background: linear-gradient(95deg, #0a2e42, #0b4b6e);
            border: none;
            padding: 18px 12px;
            border-radius: 34px;
            font-size: 1.35rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #032b3b;
            margin-bottom: 12px;
        }
        .copy-big:active { transform: translateY(2px); box-shadow: 0 2px 0 #032b3b; }
        .share-btn {
            background: #2d3a4e;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            color: white;
            display: flex;
            gap: 10px;
            justify-content: center;
            cursor: pointer;
        }
        .no-number-msg {
            background: #1e1f2e;
            padding: 14px;
            border-radius: 24px;
            text-align: center;
            color: #a0afcf;
            font-size: 0.85rem;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293bd9;
            backdrop-filter: blur(12px);
            color: #d9f0ff;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 999;
            pointer-events: none;
            font-size: 0.85rem;
            border-left: 3px solid #3b82f6;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5f6c8c;
            margin-top: 20px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (max-width: 500px) {
            .card { padding: 16px; }
            .copy-big { font-size: 1.2rem; padding: 15px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h2><i class="fas fa-qrcode"></i> কেয়ার স্ক্যানার</h2>
    <div style="text-align:center;"><span class="sub"><i class="fas fa-camera"></i> QR কোড বা যেকোনো লেখা স্ক্যান করুন</span></div>

    <div class="camera-box">
        <div id="reader"></div>
    </div>

    <!-- ক্যামেরা কন্ট্রোল + ক্যামেরা সিলেক্ট -->
    <div class="cam-controls">
        <button id="startBtn" class="btn btn-primary"><i class="fas fa-play"></i> স্ক্যান শুরু</button>
        <button id="stopBtn" class="btn btn-danger"><i class="fas fa-stop"></i> বন্ধ</button>
        <select id="cameraSelect" style="flex:1; min-width: 130px;">
            <option value="">🔍 ক্যামেরা লোড হচ্ছে...</option>
        </select>
    </div>

    <!-- ফলাফল অংশ -->
    <div class="result-area">
        <div><i class="fas fa-info-circle"></i> <strong>স্ক্যান ডিটেইলস</strong></div>
        <div class="scanned-text" id="scannedOutput">— কিছু স্ক্যান করা হয়নি —</div>
        <div id="phoneActionZone">
            <div class="no-number-msg"><i class="fas fa-mobile-alt"></i> ফোন নম্বর শনাক্ত হলে কপি ও শেয়ার বাটন দেখাবে</div>
        </div>
    </div>
    <footer><i class="fas fa-shield-alt"></i> ক্যামেরা অনুমতি দিন | ডাবল ক্লিক করুন রেজাল্ট বক্সে → রিসেট</footer>
</div>

<script>
    // DOM elements
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const cameraSelect = document.getElementById('cameraSelect');
    const scannedOutput = document.getElementById('scannedOutput');
    const phoneActionZone = document.getElementById('phoneActionZone');

    let html5QrCode = null;
    let isScanning = false;
    let availableCameras = [];
    let currentCameraId = null;
    let lastScannedText = '';
    let lastScanTime = 0;
    const DUPLICATE_DELAY = 1800; // ms

    // ফোন নম্বর এক্সট্র্যাক্ট (বাংলাদেশ+আন্তর্জাতিক)
    function extractPhoneNumber(text) {
        if (!text || typeof text !== 'string') return null;
        // ৮ থেকে ১৫ ডিজিট, +, (), স্পেস, ড্যাশ
        const patterns = [
            /(\+?\d{1,4}[\s\-]?)?\(?\d{2,5}\)?[\s\-]?\d{3,4}[\s\-]?\d{3,4}/g,
            /\b\d{10,14}\b/g
        ];
        for (let pattern of patterns) {
            let matches = text.match(pattern);
            if (matches) {
                for (let match of matches) {
                    let digits = match.replace(/\D/g, '');
                    if (digits.length >= 8 && digits.length <= 15) return match.trim();
                }
            }
        }
        // সরাসরি ডিজিটের স্ট্রিং
        let rawDigits = text.replace(/\s+/g, '').match(/\d{9,14}/);
        if (rawDigits && rawDigits[0]) return rawDigits[0];
        return null;
    }

    // টোস্ট মেসেজ
    function showToast(msg, bg = "#0f5b7a") {
        let old = document.querySelector('.toast');
        if (old) old.remove();
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
        toast.style.backgroundColor = bg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    // কপি ফাংশন
    async function copyText(data, label = "টেক্সট") {
        if (!data) return showToast("কপি করার কিছু নেই", "#dc2626");
        try {
            await navigator.clipboard.writeText(data);
            showToast(`✅ ${label} কপি হয়েছে: ${data.substring(0, 30)}`, "#10b981");
        } catch (err) {
            // fallback
            let ta = document.createElement('textarea');
            ta.value = data;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(`📋 কপি সম্পন্ন (ফলব্যাক)`, "#fbbf24");
        }
    }

    // শেয়ার
    async function shareNumber(phone) {
        if (!phone) return showToast("নম্বর নেই", "#ef4444");
        if (navigator.share) {
            try {
                await navigator.share({ title: 'ফোন নম্বর শেয়ার', text: `নম্বর: ${phone}` });
                showToast("শেয়ারিং সফল", "#4ade80");
            } catch(e) { if(e.name !== 'AbortError') showToast("শেয়ার ব্যর্থ, কপি করুন", "#f97316"); }
        } else {
            await copyText(phone, "নম্বর");
            showToast("শেয়ার API নেই, নম্বর কপি করা হয়েছে", "#facc15");
        }
    }

    // UI আপডেট যখন ফোন নম্বর পাই
    function updatePhoneUI(fullText, phoneNum) {
        if (!phoneNum) {
            phoneActionZone.innerHTML = `<div class="no-number-msg"><i class="fas fa-search"></i> স্ক্যানকৃত টেক্সটে কোনো ফোন নম্বর পাওয়া যায়নি।</div>`;
            return;
        }
        phoneActionZone.innerHTML = `
            <div class="phone-block">
                <div><i class="fas fa-phone-alt"></i> শনাক্ত নম্বর</div>
                <div class="detected-number" id="detectedPhoneSpan">${escapeHtml(phoneNum)}</div>
                <button id="bigCopyPhoneBtn" class="copy-big"><i class="fas fa-copy fa-lg"></i> কপি করুন (বড় বাটন)</button>
                <button id="sharePhoneBtn" class="share-btn"><i class="fas fa-share-alt"></i> শেয়ার করুন</button>
            </div>
        `;
        const copyBig = document.getElementById('bigCopyPhoneBtn');
        const shareBtn = document.getElementById('sharePhoneBtn');
        if (copyBig) copyBig.onclick = () => copyText(phoneNum, "ফোন নম্বর");
        if (shareBtn) shareBtn.onclick = () => shareNumber(phoneNum);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // স্ক্যান সাফল্য কলব্যাক
    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        const now = Date.now();
        if (lastScannedText === decodedText && (now - lastScanTime) < DUPLICATE_DELAY) return;
        lastScannedText = decodedText;
        lastScanTime = now;

        const displayText = decodedText.trim() || "(খালি)";
        scannedOutput.innerHTML = `<i class="fas fa-qrcode"></i> ${escapeHtml(displayText)}`;
        const phone = extractPhoneNumber(decodedText);
        updatePhoneUI(decodedText, phone);
        showToast("🎉 স্ক্যান সফল! তথ্য পাওয়া গেছে", "#2b9348");
        if (window.navigator.vibrate) navigator.vibrate(80);
    }

    // ক্যামেরা লিস্ট আপডেট
    async function listCameras() {
        try {
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length) {
                availableCameras = devices;
                cameraSelect.innerHTML = '';
                devices.forEach((cam, idx) => {
                    const option = document.createElement('option');
                    option.value = cam.id;
                    option.textContent = cam.label || `ক্যামেরা ${idx + 1} (${cam.id.slice(0, 6)})`;
                    cameraSelect.appendChild(option);
                });
                if (devices.length > 0) {
                    currentCameraId = devices[0].id;
                    cameraSelect.value = currentCameraId;
                }
            } else {
                cameraSelect.innerHTML = '<option value="">কোনো ক্যামেরা পাওয়া যায়নি</option>';
            }
        } catch (err) {
            console.warn("ক্যামেরা লিস্টিং ব্যর্থ", err);
            cameraSelect.innerHTML = '<option value="">ক্যামেরা অ্যাক্সেস করুন</option>';
        }
    }

    // ক্যামেরা শুরু (নির্দিষ্ট আইডি বা ব্যাক ক্যামেরা)
    async function startScannerWithCamera(cameraId = null) {
        if (isScanning) {
            await stopScannerInternal();
        }
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        const config = { fps: 12, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 };
        try {
            let cameraToUse = cameraId;
            if (!cameraToUse && availableCameras.length) {
                // চেষ্টা করি ব্যাক ক্যামেরা খুঁজতে
                const backCam = availableCameras.find(cam => cam.label.toLowerCase().includes('back') || cam.label.toLowerCase().includes('environment'));
                cameraToUse = backCam ? backCam.id : availableCameras[0].id;
                currentCameraId = cameraToUse;
                if(cameraSelect) cameraSelect.value = cameraToUse;
            }
            if (!cameraToUse) {
                // যদি লিস্ট না পাওয়া যায়, facingMode ব্যবহার করি
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, (errMsg)=>{});
                isScanning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                showToast("📷 ক্যামেরা চালু (ডিফল্ট)", "#2c7da0");
                return;
            }
            await html5QrCode.start(cameraToUse, config, onScanSuccess, (errMsg)=>{});
            isScanning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            showToast("✅ ক্যামেরা সক্রিয়, স্ক্যান করুন", "#0f6b3a");
        } catch (err) {
            console.error("Start error:", err);
            let errorMsg = "ক্যামেরা চালু হয়নি। অনুমতি দিন অথবা ভিন্ন ক্যামেরা নির্বাচন করুন।";
            if (err.toString().includes("NotAllowedError")) errorMsg = "🔴 ক্যামেরা অনুমতি প্রত্যাখ্যান! সেটিংস থেকে অনুমতি দিন।";
            else if (err.toString().includes("NotFoundError")) errorMsg = "❌ কোনো ক্যামেরা খুঁজে পাওয়া যায়নি।";
            showToast(errorMsg, "#b91c1c");
            isScanning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
    }

    async function stopScannerInternal() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch(e) { console.warn(e); }
        }
        isScanning = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    // শুরু বাটন: ব্যবহারকারী সিলেক্ট করা ক্যামেরা বা লিস্ট থেকে
    async function startScan() {
        if (isScanning) {
            showToast("স্ক্যানার চলছে, আগে বন্ধ করুন", "#f59e0b");
            return;
        }
        // আগে ক্যামেরা লিস্ট রিফ্রেশ
        await listCameras();
        let selectedCamId = cameraSelect.value;
        if (selectedCamId && selectedCamId !== "") {
            currentCameraId = selectedCamId;
            await startScannerWithCamera(currentCameraId);
        } else {
            // লিস্ট না থাকলে facingMode চেষ্টা
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 12, qrbox: { width: 280, height: 280 } }, onScanSuccess, ()=>{});
                isScanning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                showToast("📸 ক্যামেরা চালু (ডিফল্ট মোড)", "#3b82f6");
                // আবার ক্যামেরা লিস্ট রিফ্রেশ
                setTimeout(listCameras, 1000);
            } catch(err) {
                showToast("ক্যামেরা শুরু ব্যর্থ: অনুমতি দিন", "#dc2626");
            }
        }
    }

    async function stopScan() {
        await stopScannerInternal();
        showToast("ক্যামেরা বন্ধ করা হয়েছে", "#f97316");
    }

    // রেজাল্ট বক্স ডাবল ক্লিক রিসেট
    const resultBox = document.querySelector('.result-area');
    resultBox.addEventListener('dblclick', () => {
        if (!isScanning) {
            scannedOutput.innerHTML = '— কিছুই স্ক্যান করা হয়নি —';
            phoneActionZone.innerHTML = `<div class="no-number-msg"><i class="fas fa-mobile-alt"></i> ফোন নাম্বার শনাক্ত হলে কপি ও শেয়ার অপশন আসবে</div>`;
            lastScannedText = '';
            showToast("রেজাল্ট রিসেট করা হয়েছে", "#6c757d");
        } else {
            showToast("স্ক্যান চলছে, আগে বন্ধ করুন রিসেট করতে", "#eab308");
        }
    });

    // ক্যামেরা সিলেক্ট চেঞ্জ করলে স্ক্যান চললে বন্ধ করে নতুন ক্যামেরা শুরু?
    cameraSelect.addEventListener('change', async (e) => {
        const newCamId = e.target.value;
        if (!newCamId) return;
        if (isScanning) {
            await stopScannerInternal();
            currentCameraId = newCamId;
            await startScannerWithCamera(currentCameraId);
        } else {
            currentCameraId = newCamId;
            showToast(`ক্যামেরা সিলেক্ট করা হয়েছে: ${newCamId.slice(0,10)}`, "#4b5563");
        }
    });

    startBtn.addEventListener('click', startScan);
    stopBtn.addEventListener('click', stopScan);

    // পেজ লোডে ক্যামেরা লিস্ট নেওয়া ও স্টপ বাটন ডিজেবল
    window.addEventListener('load', async () => {
        stopBtn.disabled = true;
        await listCameras();
        // ক্যামেরা প্রিভিউ অটো স্টার্ট না করে, ইউজার স্টার্ট করবে
        showToast("👉 স্ক্যান শুরু বাটন চাপুন", "#2c7da0");
    });

    // পেজ আনলোডে ক্যামেরা বন্ধ
    window.addEventListener('beforeunload', async () => {
        if (html5QrCode && isScanning) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
    });
</script>
</body>
