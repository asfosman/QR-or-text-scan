<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ব্যাক ক্যামেরা স্ক্যানার | QR & টেক্সট</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b0f17, #141a24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(20, 26, 36, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 22px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b3e5fc, #81d4fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #9aa4bf;
            font-size: 0.8rem;
            margin-bottom: 24px;
            border-bottom: 1px dashed #2a3448;
            display: inline-block;
            width: auto;
            padding-bottom: 5px;
        }
        .camera-box {
            background: #00000030;
            border-radius: 32px;
            padding: 8px;
            border: 1px solid #2c7da0;
            margin-bottom: 18px;
        }
        #reader {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #000;
        }
        .cam-controls {
            display: flex;
            gap: 12px;
            margin: 12px 0 8px;
            justify-content: center;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2d3748;
            color: #e2e8f0;
        }
        .btn-primary { background: #0f3b5c; color: white; box-shadow: 0 2px 8px #00a0ff40; }
        .btn-danger { background: #4a2a2f; color: #fbcfe8; }
        .btn-success { background: #1f5a3a; color: white; }
        .btn-secondary { background: #3b4a5e; color: white; }
        textarea {
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            width: 100%;
            resize: vertical;
        }
        .result-area {
            background: #0f121bd9;
            border-radius: 28px;
            padding: 18px;
            margin: 20px 0;
            border: 1px solid #2a3448;
        }
        .scanned-text-box {
            background: #05070c;
            padding: 14px;
            border-radius: 20px;
            margin: 12px 0;
            border-left: 5px solid #3b82f6;
        }
        .phone-block {
            background: #10131f;
            border-radius: 24px;
            padding: 12px;
            margin-top: 8px;
        }
        .detected-number {
            background: #1a1f2b;
            padding: 12px;
            border-radius: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            color: #bbf0ff;
            word-break: break-all;
            margin: 12px 0;
        }
        .copy-big {
            width: 100%;
            background: linear-gradient(95deg, #0a2e42, #0b4b6e);
            border: none;
            padding: 18px 12px;
            border-radius: 34px;
            font-size: 1.35rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #032b3b;
            margin-bottom: 12px;
        }
        .copy-big:active { transform: translateY(2px); box-shadow: 0 2px 0 #032b3b; }
        .share-btn {
            background: #2d3a4e;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            color: white;
            display: flex;
            gap: 10px;
            justify-content: center;
            cursor: pointer;
        }
        .manual-section {
            margin-top: 20px;
            border-top: 1px solid #2a3448;
            padding-top: 18px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293bd9;
            backdrop-filter: blur(12px);
            color: #d9f0ff;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 999;
            pointer-events: none;
            font-size: 0.85rem;
            border-left: 3px solid #3b82f6;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5f6c8c;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2><i class="fas fa-camera"></i> ব্যাক ক্যামেরা স্ক্যানার</h2>
    <div style="text-align:center;"><span class="sub"><i class="fas fa-qrcode"></i> শুধুমাত্র পেছনের ক্যামেরা ব্যবহার করে QR কোড স্ক্যান করুন</span></div>

    <div class="camera-box">
        <div id="reader"></div>
    </div>

    <div class="cam-controls">
        <button id="startBtn" class="btn btn-primary"><i class="fas fa-play"></i> স্ক্যান শুরু</button>
        <button id="stopBtn" class="btn btn-danger"><i class="fas fa-stop"></i> বন্ধ</button>
    </div>

    <!-- ফলাফল ও সিলেক্টেবল টেক্সট এলাকা -->
    <div class="result-area">
        <div><i class="fas fa-info-circle"></i> <strong>স্ক্যানকৃত টেক্সট (সিলেক্ট করে কপি করুন)</strong></div>
        <div class="scanned-text-box">
            <textarea id="scannedTextArea" rows="4" placeholder="স্ক্যান করা টেক্সট এখানে দেখাবে। আপনি ইচ্ছামত অংশ সিলেক্ট করে কপি করতে পারেন।" readonly></textarea>
            <div class="flex-row" style="justify-content: flex-end;">
                <button id="copySelectedBtn" class="btn btn-secondary" style="padding: 6px 14px;"><i class="fas fa-copy"></i> সিলেক্টেড অংশ কপি</button>
                <button id="copyFullBtn" class="btn btn-secondary" style="padding: 6px 14px;"><i class="fas fa-copy"></i> পুরো টেক্সট কপি</button>
            </div>
        </div>
        <div id="phoneActionZone">
            <div class="no-number-msg" style="background:#1e1f2e; padding:14px; border-radius:24px; text-align:center; color:#a0afcf;">
                <i class="fas fa-mobile-alt"></i> ফোন নম্বর শনাক্ত হলে বড় কপি ও শেয়ার বাটন দেখাবে
            </div>
        </div>
    </div>

    <!-- ম্যানুয়াল টেক্সট ইনপুট -->
    <div class="manual-section">
        <div><i class="fas fa-keyboard"></i> <strong>ম্যানুয়ালি টেক্সট লিখুন / পেস্ট করুন</strong></div>
        <textarea id="manualText" rows="2" placeholder="এখানে যেকোনো টেক্সট লিখুন বা পেস্ট করুন..."></textarea>
        <div class="flex-row">
            <button id="processManualBtn" class="btn btn-success"><i class="fas fa-arrow-right"></i> এই টেক্সট ব্যবহার করি</button>
            <button id="clearManualBtn" class="btn btn-danger"><i class="fas fa-trash"></i> পরিষ্কার</button>
        </div>
    </div>

    <footer><i class="fas fa-shield-alt"></i> ক্যামেরা অনুমতি দিন | পেছনের ক্যামেরা স্বয়ংক্রিয়ভাবে ব্যবহার হবে</footer>
</div>

<script>
    // DOM elements
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scannedTextArea = document.getElementById('scannedTextArea');
    const phoneActionZone = document.getElementById('phoneActionZone');
    const copySelectedBtn = document.getElementById('copySelectedBtn');
    const copyFullBtn = document.getElementById('copyFullBtn');
    const manualText = document.getElementById('manualText');
    const processManualBtn = document.getElementById('processManualBtn');
    const clearManualBtn = document.getElementById('clearManualBtn');

    let html5QrCode = null;
    let isScanning = false;
    let lastScannedText = '';
    let lastScanTime = 0;
    const DUPLICATE_DELAY = 1800;

    // ফোন নম্বর এক্সট্র্যাক্ট
    function extractPhoneNumber(text) {
        if (!text || typeof text !== 'string') return null;
        const patterns = [
            /(\+?\d{1,4}[\s\-]?)?\(?\d{2,5}\)?[\s\-]?\d{3,4}[\s\-]?\d{3,4}/g,
            /\b\d{10,14}\b/g
        ];
        for (let pattern of patterns) {
            let matches = text.match(pattern);
            if (matches) {
                for (let match of matches) {
                    let digits = match.replace(/\D/g, '');
                    if (digits.length >= 8 && digits.length <= 15) return match.trim();
                }
            }
        }
        let rawDigits = text.replace(/\s+/g, '').match(/\d{9,14}/);
        if (rawDigits && rawDigits[0]) return rawDigits[0];
        return null;
    }

    function showToast(msg, bg = "#0f5b7a") {
        let old = document.querySelector('.toast');
        if (old) old.remove();
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
        toast.style.backgroundColor = bg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    async function copyTextToClipboard(text, label = "টেক্সট") {
        if (!text) return showToast("কপি করার কিছু নেই", "#dc2626");
        try {
            await navigator.clipboard.writeText(text);
            showToast(`✅ ${label} কপি হয়েছে: ${text.substring(0, 40)}`, "#10b981");
        } catch (err) {
            let ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(`📋 কপি সম্পন্ন (ফলব্যাক)`, "#fbbf24");
        }
    }

    async function shareNumber(phone) {
        if (!phone) return showToast("নম্বর নেই", "#ef4444");
        if (navigator.share) {
            try {
                await navigator.share({ title: 'ফোন নম্বর শেয়ার', text: `নম্বর: ${phone}` });
                showToast("শেয়ারিং সফল", "#4ade80");
            } catch(e) { if(e.name !== 'AbortError') showToast("শেয়ার ব্যর্থ, কপি করুন", "#f97316"); }
        } else {
            await copyTextToClipboard(phone, "নম্বর");
            showToast("শেয়ার API নেই, নম্বর কপি করা হয়েছে", "#facc15");
        }
    }

    function updatePhoneUI(fullText, phoneNum) {
        if (!phoneNum) {
            phoneActionZone.innerHTML = `<div class="no-number-msg" style="background:#1e1f2e; padding:14px; border-radius:24px; text-align:center; color:#a0afcf;"><i class="fas fa-search"></i> স্ক্যানকৃত টেক্সটে কোনো ফোন নম্বর পাওয়া যায়নি।</div>`;
            return;
        }
        phoneActionZone.innerHTML = `
            <div class="phone-block">
                <div><i class="fas fa-phone-alt"></i> স্বয়ংক্রিয়ভাবে শনাক্ত নম্বর</div>
                <div class="detected-number" id="detectedPhoneSpan">${escapeHtml(phoneNum)}</div>
                <button id="bigCopyPhoneBtn" class="copy-big"><i class="fas fa-copy fa-lg"></i> কপি করুন (বড় বাটন)</button>
                <button id="sharePhoneBtn" class="share-btn"><i class="fas fa-share-alt"></i> শেয়ার করুন</button>
            </div>
        `;
        const copyBig = document.getElementById('bigCopyPhoneBtn');
        const shareBtn = document.getElementById('sharePhoneBtn');
        if (copyBig) copyBig.onclick = () => copyTextToClipboard(phoneNum, "ফোন নম্বর");
        if (shareBtn) shareBtn.onclick = () => shareNumber(phoneNum);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // স্ক্যান সাফল্য কলব্যাক
    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        const now = Date.now();
        if (lastScannedText === decodedText && (now - lastScanTime) < DUPLICATE_DELAY) return;
        lastScannedText = decodedText;
        lastScanTime = now;
        updateDisplayedText(decodedText);
        showToast("🎉 স্ক্যান সফল! টেক্সট পাওয়া গেছে", "#2b9348");
        if (window.navigator.vibrate) navigator.vibrate(80);
    }

    function updateDisplayedText(rawText) {
        const displayText = rawText || "(খালি)";
        scannedTextArea.value = displayText;
        const phone = extractPhoneNumber(displayText);
        updatePhoneUI(displayText, phone);
    }

    // শুধুমাত্র পেছনের ক্যামেরা ব্যবহার করে স্ক্যানার চালু
    async function startBackCameraScanner() {
        if (isScanning) {
            await stopScanner();
        }
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }
        const config = {
            fps: 12,
            qrbox: { width: 280, height: 280 },
            aspectRatio: 1.0
        };
        try {
            // শুধুমাত্র environment (পেছনের ক্যামেরা) ব্যবহার করব
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                (errorMessage) => {
                    // স্ক্যান ব্যর্থ হলে কিছু করব না, শুধু কনসোল এড়াতে
                    // console.log(errorMessage);
                }
            );
            isScanning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            showToast("📷 পেছনের ক্যামেরা চালু হয়েছে, QR কোড স্ক্যান করুন", "#2c7da0");
        } catch (err) {
            console.error("ক্যামেরা শুরু ত্রুটি:", err);
            let errorMsg = "পেছনের ক্যামেরা চালু করা যায়নি। অনুমতি দিন অথবা আপনার ডিভাইসে ব্যাক ক্যামেরা নেই।";
            if (err.toString().includes("NotAllowedError")) errorMsg = "🔴 ক্যামেরা অনুমতি প্রত্যাখ্যান! অনুমতি দিন।";
            else if (err.toString().includes("NotFoundError")) errorMsg = "❌ কোনো ক্যামেরা খুঁজে পাওয়া যায়নি।";
            showToast(errorMsg, "#b91c1c");
            isScanning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch(e) { console.warn(e); }
        }
        isScanning = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        showToast("ক্যামেরা বন্ধ করা হয়েছে", "#f97316");
    }

    // ম্যানুয়াল টেক্সট প্রসেস
    function processManualText() {
        let userText = manualText.value.trim();
        if (userText === "") {
            showToast("দয়া করে কিছু টেক্সট লিখুন বা পেস্ট করুন", "#f97316");
            return;
        }
        updateDisplayedText(userText);
        showToast("ম্যানুয়াল টেক্সট সেট করা হয়েছে", "#3b82f6");
    }

    // কপি সিলেক্টেড অংশ
    function copySelected() {
        const textarea = scannedTextArea;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        if (start === end) {
            showToast("কোনো টেক্সট সিলেক্ট করা হয়নি। পুরো টেক্সট কপি করতে নিচের বাটন ব্যবহার করুন।", "#facc15");
            return;
        }
        const selected = textarea.value.substring(start, end);
        copyTextToClipboard(selected, "সিলেক্টেড টেক্সট");
    }

    function copyFull() {
        const fullText = scannedTextArea.value;
        if (!fullText) return showToast("কপি করার মতো টেক্সট নেই", "#dc2626");
        copyTextToClipboard(fullText, "পুরো টেক্সট");
    }

    // ইভেন্ট লিসেনার
    startBtn.addEventListener('click', startBackCameraScanner);
    stopBtn.addEventListener('click', stopScanner);
    copySelectedBtn.addEventListener('click', copySelected);
    copyFullBtn.addEventListener('click', copyFull);
    processManualBtn.addEventListener('click', processManualText);
    clearManualBtn.addEventListener('click', () => { manualText.value = ''; showToast("ম্যানুয়াল ফিল্ড পরিষ্কার", "#6c757d"); });

    window.addEventListener('load', () => {
        stopBtn.disabled = true;
        showToast("👉 'স্ক্যান শুরু' বাটন চাপুন - শুধু পেছনের ক্যামেরা ব্যবহার হবে", "#2c7da0");
    });

    window.addEventListener('beforeunload', async () => {
        if (html5QrCode && isScanning) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
    });
</script>
</body>
</html>
